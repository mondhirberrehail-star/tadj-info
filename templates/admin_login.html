<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TADJ-INFO — دخول الإدارة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-dark); }
    .login-card { background: var(--bg-card); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 380px; box-shadow: var(--shadow-xl); }
    .login-card__logo { text-align: center; margin-bottom: 2rem; }
    .login-card__title { font-size: 1.1rem; color: var(--text-muted); text-align: center; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-card__logo">
      <div class="logo" style="justify-content:center">
        <div class="logo__monogram"><span class="logo__ti">Ti</span></div>
        <span class="logo__wordmark">TADJ<span class="logo__dash">-</span>INFO</span>
      </div>
    </div>
    <p class="login-card__title">لوحة الإدارة — Panneau Admin</p>

    {% if error %}
    <div class="form-feedback form-feedback--error" style="display:block;margin-bottom:1rem">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label class="form-label" for="password">كلمة المرور</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="••••••••" required autofocus>
      </div>
      <button type="submit" class="btn btn--primary btn--full" style="margin-top:0.5rem">دخول</button>
    </form>
  </div>
</body>
</html>
